name: cla

# Contributor License Agreement gate (ADR-0022). Contributors sign by commenting
# the agreement phrase on their PR; signatures are stored in this repo.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: read

concurrency:
  group: cla-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  cla:
    runs-on: ubuntu-latest
    permissions:
      actions: write # the action re-runs itself to re-check
      contents: write # store signatures file in this repo
      pull-requests: write # comment on / label the PR
      statuses: write # set the CLA commit status
    steps:
      - name: CLA assistant
        if: >
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: ".github/cla/signatures.json"
          path-to-document: "https://github.com/fbritoferreira/enbi/blob/main/CLA.md"
          branch: "main"
          allowlist: "bot*,dependabot[bot],renovate[bot]"
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✅"
