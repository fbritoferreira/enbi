name: release

# Changesets-driven release (ADR-0026). On push to main:
#  - if changesets are pending, opens/updates a "Version Packages" PR that bumps
#    versions and writes per-package CHANGELOGs;
#  - if none are pending (i.e. that PR was merged, or versions are ahead of npm),
#    publishes changed packages to npm via OIDC and creates GitHub Releases.
# One workflow, no cross-workflow trigger needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Human-gated environment; the OIDC subject is bound to it (ADR-0008).
    environment: npm-publish
    permissions:
      contents: write # version-PR commits, tags, GitHub Releases
      pull-requests: write # open the Version Packages PR
      id-token: write # OIDC trusted publishing — NO NPM_TOKEN is stored
    steps:
      # Audit mode while the endpoint allowlist is being confirmed (ADR-0013).
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            viteplus.dev:443
            registry.npmjs.org:443
            nodejs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run -r build
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: vp run version-packages
          publish: vp run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OIDC trusted publishing: no NPM_TOKEN. Provenance is attested.
          NPM_CONFIG_PROVENANCE: "true"
