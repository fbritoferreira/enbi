name: release

# Cut a GitHub Release when the repo-wide version is bumped on the default branch
# (ADR-0023, ADR-0025). This does NOT publish to npm — `publish.yml` listens for
# the release event and does that. Can also be run manually.
#
# Note: a release created with the default GITHUB_TOKEN does not re-trigger other
# workflows (GitHub loop-prevention). To auto-trigger `publish.yml`, set a
# `RELEASE_PAT` secret; otherwise publish the release from the GitHub UI, which
# triggers it.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag + GitHub Release
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
          allowed-endpoints: >
            github.com:443
            api.github.com:443
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Create release if the version was bumped
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          if gh release view "v$version" >/dev/null 2>&1; then
            echo "::notice::release v$version already exists — nothing to do"
          else
            gh release create "v$version" \
              --title "enbi v$version" \
              --generate-notes \
              --target "$GITHUB_SHA"
            echo "::notice::created release v$version"
          fi
