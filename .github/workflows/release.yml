name: release

# Changesets-driven release, pnpm-native (ADR-0026, pnpm.io/using-changesets).
# On push to main:
#  - if changesets are pending, the action opens/updates a "Version Packages" PR
#    (bumps + per-package CHANGELOGs);
#  - if none are pending, publish with `pnpm publish -r` (OIDC, no token), then
#    tag and cut GitHub Releases.
# Publishing uses pnpm (not `changeset publish`) so the repo's pnpm `devEngines`
# guard is respected — `changeset publish` shells out to npm, which rejects
# `devEngines.packageManager: pnpm` (EBADDEVENGINES).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Human-gated environment; the OIDC subject is bound to it (ADR-0008).
    environment: npm-publish
    permissions:
      contents: write # version-PR commits, tags, GitHub Releases
      pull-requests: write # open the Version Packages PR
      id-token: write # OIDC trusted publishing — NO NPM_TOKEN is stored
    steps:
      # Audit mode while the endpoint allowlist is being confirmed (ADR-0013).
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            viteplus.dev:443
            registry.npmjs.org:443
            nodejs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: "24"
          cache: true
      # setup-vp manages pnpm internally for `vp`, but does not put `pnpm` on
      # PATH for plain run-steps. Corepack provides the pinned pnpm (from the
      # `packageManager` field) without invoking npm (which the pnpm devEngines
      # guard would reject).
      - run: corepack enable
      - run: vp install --frozen-lockfile
      - run: vp run -r build
      # Manages the "Version Packages" PR when changesets are pending. Publishing
      # is handled by the next step (pnpm), so no `publish` input here.
      - id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm run version-packages
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # When there are no pending changesets, the released versions are current:
      # publish via pnpm (OIDC), then tag and create GitHub Releases.
      - name: Publish to npm and create GitHub Releases
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          # Idempotent: pnpm publishes only versions not already on the registry.
          pnpm publish -r --no-git-checks --access public
          # Create git tags for the current package versions and push them.
          pnpm exec changeset tag
          git push --tags --no-verify
          # A GitHub Release per new tag, with auto-generated notes.
          for tag in $(git tag --points-at HEAD); do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "::notice::release $tag already exists — skipping"
            else
              gh release create "$tag" --title "$tag" --generate-notes
            fi
          done
