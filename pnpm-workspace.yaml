packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@changesets/cli": ^2.31.0
  "@changesets/changelog-git": ^0.2.1
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
  hono: ^4
  "@hono/node-server": ^1
  better-auth: 1.7.0-beta.6
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.10
  "@libsql/client": ^0.17.4
  pg: ^8.21.0
  "@types/pg": ^8.20.0
  mysql2: ^3.22.5
  cac: ^7.0.0
  jiti: ^2.7.0
  astro: ^6.4.7
  "@playwright/test": ^1.61.0
  testcontainers: ^12.0.3
  "@testcontainers/postgresql": ^12.0.3
  "@testcontainers/mysql": ^12.0.3

# Supply-chain hardening: no dependency runs lifecycle (postinstall) scripts.
# Vite+ manages build approvals via `allowBuilds` (below); `false` = acknowledged
# and NOT built. (ADR-0008)
onlyBuiltDependencies: []
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
minimumReleaseAgeExclude:
  - "@better-auth/core@1.7.0-beta.6"
  - "@better-auth/drizzle-adapter@1.7.0-beta.6"
  - "@better-auth/kysely-adapter@1.7.0-beta.6"
  - "@better-auth/memory-adapter@1.7.0-beta.6"
  - "@better-auth/mongo-adapter@1.7.0-beta.6"
  - "@better-auth/prisma-adapter@1.7.0-beta.6"
  - "@better-auth/telemetry@1.7.0-beta.6"
  - better-auth@1.7.0-beta.6
  - "@testcontainers/mysql@12.0.3"
  - "@testcontainers/postgresql@12.0.3"
  - testcontainers@12.0.3
allowBuilds:
  cpu-features: false
  esbuild: false
  protobufjs: false
  sharp: false
  ssh2: false
