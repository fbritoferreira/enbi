packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
  hono: ^4
  "@hono/node-server": ^1
  better-auth: 1.7.0-beta.6
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.10
  "@libsql/client": ^0.17.4
  pg: ^8.21.0
  "@types/pg": ^8.20.0
  mysql2: ^3.22.5

# Supply-chain hardening: no dependency may run lifecycle (postinstall) scripts
# unless explicitly allowlisted here. (ADR-0008)
onlyBuiltDependencies: []
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  esbuild: set this to true or false
  sharp: set this to true or false
minimumReleaseAgeExclude:
  - "@better-auth/core@1.7.0-beta.6"
  - "@better-auth/drizzle-adapter@1.7.0-beta.6"
  - "@better-auth/kysely-adapter@1.7.0-beta.6"
  - "@better-auth/memory-adapter@1.7.0-beta.6"
  - "@better-auth/mongo-adapter@1.7.0-beta.6"
  - "@better-auth/prisma-adapter@1.7.0-beta.6"
  - "@better-auth/telemetry@1.7.0-beta.6"
  - better-auth@1.7.0-beta.6
